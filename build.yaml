#    snippet: studio-rpc-usb-uart
#  - board: seeed_xiao_ble
#    shield: corne_xiao_v2_right rgbled_adapter


    ---
include:
  # Left side (Central) - Includes ZMK Studio support
  - board: seeed_xiao_ble//zmk
    shield: corne_xiao_v2_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: corne_xiao_v2_left_studio

  # Right side (Peripheral) - Includes the RGB LED widget adapter
  - board: seeed_xiao_ble//zmk
    shield: corne_xiao_v2_right rgbled_adapter
    artifact-name: corne_xiao_v2_right_rgb

